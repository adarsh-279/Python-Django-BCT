<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>

    <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #f4f6f8;
        margin: 0;
        padding: 20px;
    }

    .container {
        background: white;
        padding: 30px;
        max-width: 400px;
        margin: 40px auto; /* ✅ centers vertically properly */
        border-radius: 10px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ddd;
        border-radius: 6px;
        outline: none;
        font-size: 14px;
    }

    input:focus, textarea:focus {
        border-color: #111;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #111;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #333;
    }

    .success {
        text-align: center;
        color: green;
        margin-bottom: 10px;
        font-size: 14px;
    }

</style>
</head>
<body>

<div class="container">

    <h2>Feedback Form</h2>

    {% if success %}
        <p class="success">✅ Feedback submitted successfully!</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" rows="4" placeholder="Your Feedback" required></textarea>

        <button type="submit">Submit</button>
    </form>

</div>

</body>
</html>
