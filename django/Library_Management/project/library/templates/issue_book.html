<!DOCTYPE html>
<html>
<head>
    <title>Issue Book</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-box {
            background: white;
            padding: 30px;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #111;
            color: white;
            border: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="form-box">
    <h2>Issue Book</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Issue</button>
    </form>
</div>

</body>
</html>
