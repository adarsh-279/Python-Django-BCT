<!DOCTYPE html>
<html>
<head>
    <title>All Students</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: #eef2f7;
        }

        .container {
            padding: 30px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #111;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .nav {
            text-align: center;
            margin: 20px;
        }

        .nav a {
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
            color: black;
        }
    </style>
</head>
<body>

<div class="nav">
    <a href="/">Home</a>
    <a href="/add-student/">Add Student</a>
    <a href="/books/">View Books</a>
</div>

<div class="container">
    <h2>👨‍🎓 All Students</h2>

    <table>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Student ID</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student.name }}</td>
            <td>{{ student.email }}</td>
            <td>{{ student.student_id }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
