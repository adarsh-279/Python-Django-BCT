<!DOCTYPE html>
<html>
<head>
    <title>All Books</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: #f5f7fa;
        }

        .container {
            padding: 30px;
        }

        h2 {
            text-align: center;
        }

        table {
            width: 90%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: black;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .nav {
            text-align: center;
            margin: 20px;
        }

        .nav a {
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
            color: black;
        }
    </style>
</head>
<body>

<div class="nav">
    <a href="/">Home</a>
    <a href="/add-book/">Add Book</a>
    <a href="/students/">View Students</a>
</div>

<div class="container">
    <h2>📚 All Books</h2>

    <table>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>ISBN</th>
            <th>Quantity</th>
        </tr>

        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.isbn }}</td>
            <td>{{ book.quantity }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
